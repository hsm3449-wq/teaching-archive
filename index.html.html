<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 현장 사례 및 성찰 아카이브</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .dragging {
            opacity: 0.4;
            background: #e0e7ff !important;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🌱</span>
            <h1 class="text-xl font-bold text-slate-800 cursor-pointer" onclick="goHome()">교사 현장 아카이브</h1>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="openAllList()" class="text-sm text-slate-600 hover:text-indigo-600 font-semibold transition">
                📚 사례 살펴보기
            </button>
            <button onclick="openReflectionList()" class="text-sm text-slate-600 hover:text-indigo-600 font-semibold transition">
                📝 성찰 리스트
            </button>
            <button onclick="openPdfList()" class="text-sm text-slate-600 hover:text-indigo-600 font-semibold transition">
                📖 통합 사례집
            </button>
            <button id="addPostBtn" onclick="openWriteModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition shadow-sm hidden">
                + 항목 추가하기
            </button>
            <button onclick="toggleAdminMode()" id="adminToggleBtn" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3.5 py-2.5 rounded-xl font-medium transition">
                🔒 관리자 모드 OFF
            </button>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <main class="max-w-4xl w-full mx-auto px-6 py-20 flex-1 flex flex-col items-center justify-center">
        
        <!-- 초기 메인 화면 -->
        <div id="mainView" class="w-full text-center space-y-12">
            <div class="space-y-3">
                <h2 class="text-4xl font-bold tracking-tight text-slate-900">필요한 현장 사례를 검색해보세요</h2>
                <p class="text-slate-500 text-base">키워드, 제목, 내용까지 모두 검색할 수 있습니다.</p>
            </div>

            <!-- 검색바 -->
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="예: 적응기간, 분리불안, 문화 (키워드/내용 검색)" 
                    class="w-full pl-6 pr-14 py-4 rounded-2xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent shadow-md text-base transition"
                    onkeypress="if(event.key === 'Enter') handleSearch()">
                <button onclick="handleSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>

            <!-- 하단 카드 메뉴 3개 -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-3xl mx-auto pt-6">
                <div onclick="openAllList()" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 cursor-pointer transition text-left space-y-3 group">
                    <div class="text-3xl">📚</div>
                    <h3 class="font-bold text-slate-900 text-lg group-hover:text-indigo-600 transition">사례 살펴보기</h3>
                    <p class="text-sm text-slate-500 leading-relaxed">선생님들이 공유한 생생한 현장 교육 사례들입니다.</p>
                </div>

                <div onclick="openReflectionList()" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 cursor-pointer transition text-left space-y-3 group">
                    <div class="text-3xl">📝</div>
                    <h3 class="font-bold text-slate-900 text-lg group-hover:text-indigo-600 transition">성찰 리스트 보기</h3>
                    <p class="text-sm text-slate-500 leading-relaxed">영역, 핵심 질문, 내용으로 구성된 생각 리스트입니다.</p>
                </div>

                <div onclick="openPdfList()" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 cursor-pointer transition text-left space-y-3 group">
                    <div class="text-3xl">📖</div>
                    <h3 class="font-bold text-slate-900 text-lg group-hover:text-indigo-600 transition">통합 사례집 보기</h3>
                    <p class="text-sm text-slate-500 leading-relaxed">업로드된 교육 사례집 PDF 문서를 바로 열람하세요.</p>
                </div>
            </div>
        </div>

        <!-- 결과 / 목록 공용 뷰 -->
        <div id="resultView" class="w-full hidden space-y-6">
            <div class="flex justify-between items-center pb-2">
                <button onclick="goHome()" class="text-sm text-indigo-600 hover:underline flex items-center space-x-1 font-semibold">
                    <span>← 검색 화면으로 돌아가기</span>
                </button>
                <span id="resultCount" class="text-sm text-slate-500 font-medium"></span>
            </div>

            <div id="cardContainer" class="space-y-5"></div>
        </div>

    </main>

    <!-- PDF 뷰어 모달 -->
    <div id="pdfModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-4xl w-full p-6 space-y-4 shadow-xl relative h-[85vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 id="pdfModalTitle" class="text-lg font-bold text-slate-800">통합 사례집 PDF 뷰어</h3>
                <button onclick="closePdfModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
            </div>
            <div class="flex-1 w-full bg-slate-100 rounded-2xl overflow-hidden border">
                <iframe id="pdfViewerFrame" src="" class="w-full h-full" frameborder="0"></iframe>
            </div>
            <div class="flex justify-end pt-2">
                <button onclick="closePdfModal()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium transition">닫기</button>
            </div>
        </div>
    </div>

    <!-- 상세 내용 읽기 모달 -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 space-y-4 shadow-xl relative max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-start border-b pb-3">
                <div id="detailModalHeader" class="space-y-1.5 pr-6"></div>
                <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
            </div>
            <div class="space-y-4 pt-2">
                <h3 id="detailModalTitle" class="text-xl font-bold text-slate-900 leading-snug"></h3>
                <div id="detailModalContent" class="text-slate-700 text-base leading-relaxed whitespace-pre-wrap pt-3 border-t border-slate-100"></div>
            </div>
            <div class="flex justify-end pt-4 border-t border-slate-100">
                <button onclick="closeDetailModal()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-medium transition">닫기</button>
            </div>
        </div>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="writeModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 space-y-4 shadow-xl">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 id="modalTitleText" class="text-lg font-bold text-slate-800">새로운 항목 추가</h3>
                <button onclick="closeWriteModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
            </div>
            <input type="hidden" id="postId">
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">구분 선택</label>
                    <select id="itemCategoryType" class="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" onchange="updateModalFields()">
                        <option value="case">교육 사례</option>
                        <option value="reflection">교사 성찰 문항</option>
                        <option value="pdf">통합 사례집 (PDF 링크 입력)</option>
                    </select>
                </div>
                <div id="fieldGroupArea" class="hidden">
                    <label class="block text-xs font-semibold text-slate-600 mb-1">영역</label>
                    <input type="text" id="postArea" placeholder="예: 다문화 및 포용, 환경구성" class="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div id="titleFieldGroup">
                    <label id="titleLabel" class="block text-xs font-semibold text-slate-600 mb-1">제목</label>
                    <input type="text" id="postTitle" placeholder="제목을 입력하세요" class="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div id="keywordFieldGroup">
                    <label class="block text-xs font-semibold text-slate-600 mb-1">검색 키워드 (띄어쓰기 또는 쉼표 구분)</label>
                    <input type="text" id="postKeyword" placeholder="예: 적응기간, 분리불안" class="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div id="contentFieldGroup">
                    <label id="contentLabel" class="block text-xs font-semibold text-slate-600 mb-1">상세 내용 및 노하우 (또는 PDF 구글 드라이브 링크)</label>
                    <textarea id="postContent" rows="5" placeholder="내용을 입력하세요. (PDF인 경우 드라이브 뷰어 링크 입력)" class="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-2 pt-2">
                <button onclick="closeWriteModal()" class="px-4 py-2 border rounded-xl text-sm font-medium hover:bg-slate-100 transition">취소</button>
                <button onclick="savePostToFirebase()" id="saveButtonText" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition">등록하기</button>
            </div>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="text-center py-6 text-xs text-slate-400 border-t border-slate-200">
        교사들을 위한 비밀 검색 아카이브 &copy; 2026
    </footer>

    <!-- 파이어베이스 연동 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, remove, push } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaL07U5q3gZhiB8ANHxeA3MRs7K7rXstw",
            authDomain: "teaching-55fe1.firebaseapp.com",
            databaseURL: "https://teaching-55fe1-default-rtdb.firebaseio.com",
            projectId: "teaching-55fe1",
            storageBucket: "teaching-55fe1.firebasestorage.app",
            messagingSenderId: "589443223343",
            appId: "1:589443223343:web:4c8ea658dd55903c23dbda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isAdminMode = false;
        let currentActiveMode = 'case';
        let cachedPosts = [];

        window.fetchPostsFromFirebase = async function() {
            try {
                const postsRef = ref(db, 'posts');
                const snapshot = await get(postsRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    cachedPosts = Object.keys(data).map(key => ({
                        firebaseKey: key,
                        ...data[key]
                    }));
                } else {
                    cachedPosts = [];
                }
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                cachedPosts = [];
            }
            refreshCurrentView();
        }

        fetchPostsFromFirebase();

        window.toggleAdminMode = function() {
            if (!isAdminMode) {
                const password = prompt('관리자 비밀번호를 입력하세요 (기본: 1234)');
                if (password === '1234') {
                    isAdminMode = true;
                    alert('관리자 모드가 켜졌습니다.');
                } else if (password !== null) {
                    alert('비밀번호가 틀렸습니다.');
                    return;
                } else {
                    return;
                }
            } else {
                isAdminMode = false;
                alert('관리자 모드가 해제되었습니다.');
            }

            const btn = document.getElementById('adminToggleBtn');
            const addBtn = document.getElementById('addPostBtn');

            if (isAdminMode) {
                btn.className = "text-xs bg-indigo-100 text-indigo-700 px-3.5 py-2.5 rounded-xl font-medium transition border border-indigo-200";
                btn.innerText = "🔓 관리자 모드 ON";
                addBtn.classList.remove('hidden');
            } else {
                btn.className = "text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3.5 py-2.5 rounded-xl font-medium transition";
                btn.innerText = "🔒 관리자 모드 OFF";
                addBtn.classList.add('hidden');
            }

            refreshCurrentView();
        }

        window.linkifyText = function(text) {
            if (!text) return '';
            const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlRegex, function(url) {
                return '<a href="' + url + '" target="_blank" class="text-indigo-600 underline hover:text-indigo-800 break-all" onclick="event.stopPropagation()">' + url + '</a>';
            });
        }

        window.handleSearch = function() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) {
                alert('검색어를 입력해주세요!');
                return;
            }

            currentActiveMode = 'search';
            const matchedPosts = cachedPosts.filter(post => 
                post.type !== 'pdf' && (
                    post.title.toLowerCase().includes(query) ||
                    (post.area && post.area.toLowerCase().includes(query)) ||
                    (post.keywords && post.keywords.some(kw => kw.toLowerCase().includes(query))) ||
                    post.content.toLowerCase().includes(query)
                )
            );

            renderCards(matchedPosts, `'${query}' 검색 결과 (${matchedPosts.length}개)`);
        }

        window.openAllList = function() {
            currentActiveMode = 'case';
            const posts = cachedPosts.filter(p => p.type === 'case');
            renderCards(posts, `다양한 사례 살펴보기 (${posts.length}개)`);
        }

        window.openReflectionList = function() {
            currentActiveMode = 'reflection';
            const posts = cachedPosts.filter(p => p.type === 'reflection');
            renderReflectionListUI(posts);
        }

        window.openPdfList = function() {
            currentActiveMode = 'pdf';
            const posts = cachedPosts.filter(p => p.type === 'pdf');
            renderPdfListUI(posts);
        }

        window.renderPdfListUI = function(postsArray) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');

            const container = document.getElementById('cardContainer');
            document.getElementById('resultCount').innerText = `통합 사례집 목록 (${postsArray.length}개)`;

            container.innerHTML = '';

            if (postsArray.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl border text-center space-y-3 shadow-sm">
                        <p class="text-slate-500 text-sm">등록된 사례집 PDF가 없습니다.</p>
                        <p class="text-xs text-slate-400">관리자 모드를 켜고 PDF 링크를 추가해보세요!</p>
                    </div>
                `;
                return;
            }

            postsArray.forEach(post => {
                let adminButtonsHtml = '';
                if (isAdminMode) {
                    adminButtonsHtml = `
                        <div class="flex justify-end space-x-2 pt-3 border-t border-slate-100" onclick="event.stopPropagation()">
                            <button onclick="openEditModal('${post.firebaseKey}')" class="text-xs text-slate-500 hover:text-indigo-600 font-medium px-2.5 py-1 rounded-lg hover:bg-slate-100 transition">✏️ 수정</button>
                            <button onclick="deletePost('${post.firebaseKey}')" class="text-xs text-rose-500 hover:text-rose-700 font-medium px-2.5 py-1 rounded-lg hover:bg-rose-50 transition">🗑️ 삭제</button>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-3 transition hover:shadow-md cursor-pointer";
                card.onclick = () => openPdfModal(post.content, post.title);

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <span class="text-3xl">📖</span>
                            <div>
                                <span class="bg-emerald-50 text-emerald-700 text-xs px-2.5 py-1 rounded-lg font-bold">PDF 사례집</span>
                                <h3 class="text-lg font-bold text-slate-900 mt-1">${post.title}</h3>
                            </div>
                        </div>
                        <span class="text-xs bg-indigo-50 text-indigo-600 px-3.5 py-2 rounded-xl font-medium">PDF 뷰어로 열기 &rarr;</span>
                    </div>
                    ${adminButtonsHtml}
                `;
                container.appendChild(card);
            });
        }

        window.openPdfModal = function(pdfUrl, title) {
            document.getElementById('pdfModalTitle').innerText = title;
            document.getElementById('pdfViewerFrame').src = pdfUrl;

            const modal = document.getElementById('pdfModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        window.closePdfModal = function() {
            const modal = document.getElementById('pdfModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('pdfViewerFrame').src = '';
        }

        window.renderReflectionListUI = function(postsArray) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');

            const container = document.getElementById('cardContainer');
            let guideText = isAdminMode ? ' (💡 카드를 잡고 드래그하여 순서 변경 가능)' : '';
            document.getElementById('resultCount').innerText = `교사 성찰 리스트 (${postsArray.length}개 문항)${guideText}`;

            container.innerHTML = '';

            if (postsArray.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl border text-center space-y-3 shadow-sm">
                        <p class="text-slate-500 text-sm">등록된 성찰 문항이 없습니다.</p>
                        <p class="text-xs text-slate-400">관리자 모드를 켜고 첫 번째 성찰 문항을 추가해보세요!</p>
                    </div>
                `;
                return;
            }

            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = "space-y-4 reflection-list-group";

            postsArray.forEach(post => {
                let adminButtonsHtml = '';
                let dragClass = '';

                if (isAdminMode) {
                    dragClass = 'cursor-grab active:cursor-grabbing hover:border-indigo-300';
                    adminButtonsHtml = `
                        <div class="flex space-x-2 pt-3 border-t border-slate-100 justify-end items-center" onclick="event.stopPropagation()">
                            <span class="text-xs text-slate-400 mr-auto">⠿ 세트 드래그 이동</span>
                            <button onclick="openEditModal('${post.firebaseKey}')" class="text-xs text-slate-500 hover:text-indigo-600 font-medium px-2.5 py-1 rounded hover:bg-slate-50 transition">✏️ 수정</button>
                            <button onclick="deletePost('${post.firebaseKey}')" class="text-xs text-rose-500 hover:text-rose-700 font-medium px-2.5 py-1 rounded hover:bg-rose-50 transition">🗑️ 삭제</button>
                        </div>
                    `;
                }

                const keywordsHtml = post.keywords ? post.keywords.map(kw => `<span class="bg-indigo-50 text-indigo-600 text-xs px-2.5 py-1 rounded-lg font-medium">#${kw}</span>`).join(' ') : '';

                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-3 transition reflection-item hover:shadow-md cursor-pointer ${dragClass}`;
                card.setAttribute('draggable', isAdminMode ? 'true' : 'false');
                card.setAttribute('data-key', post.firebaseKey);
                card.onclick = (e) => {
                    if(e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                    openDetailModal(post);
                };

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="space-y-1.5 pr-4">
                            <span class="bg-indigo-50 text-indigo-700 text-xs px-2.5 py-1 rounded-lg font-bold">📌 영역: ${post.area || '기본'}</span>
                            <h3 class="text-lg font-bold text-slate-900 leading-snug">${post.title}</h3>
                        </div>
                        <div class="flex flex-wrap gap-1 justify-end" onclick="event.stopPropagation()">${keywordsHtml}</div>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed line-clamp-2">${linkifyText(post.content)}</p>
                    ${adminButtonsHtml}
                `;
                wrapperDiv.appendChild(card);
            });

            container.appendChild(wrapperDiv);

            if (isAdminMode) {
                initDragAndDrop();
            }
        }

        window.initDragAndDrop = function() {
            const group = document.querySelector('.reflection-list-group');
            if (!group) return;

            const items = group.querySelectorAll('.reflection-item');

            items.forEach(item => {
                item.addEventListener('dragstart', () => {
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    saveNewOrder(group);
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const draggingItem = document.querySelector('.dragging');
                    const afterElement = getDragAfterElement(group, e.clientY);
                    if (afterElement == null) {
                        group.appendChild(draggingItem);
                    } else {
                        group.insertBefore(draggingItem, afterElement);
                    }
                });
            });
        }

        window.getDragAfterElement = function(container, y) {
            const draggableElements = [...container.querySelectorAll('.reflection-item:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        window.saveNewOrder = function(groupElement) {
            const items = groupElement.querySelectorAll('.reflection-item');
            const newKeys = [...items].map(item => item.getAttribute('data-key'));

            // 순서 배열에 맞춰 cachedPosts 재정렬 후 반영 가능
            const reflections = cachedPosts.filter(p => p.type === 'reflection');
            const nonReflections = cachedPosts.filter(p => p.type !== 'reflection');

            const reorderedReflections = [];
            newKeys.forEach(key => {
                const found = reflections.find(p => p.firebaseKey === key);
                if (found) reorderedReflections.push(found);
            });

            cachedPosts = [...nonReflections, ...reorderedReflections];
        }

        window.renderCards = function(postsArray, headerText) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');

            const container = document.getElementById('cardContainer');
            document.getElementById('resultCount').innerText = headerText;

            container.innerHTML = '';

            if (postsArray.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl border text-center space-y-3 shadow-sm">
                        <p class="text-slate-500 text-sm">등록된 항목이 없습니다.</p>
                        <p class="text-xs text-slate-400">관리자 모드를 켜고 항목을 추가해보세요!</p>
                    </div>
                `;
                return;
            }

            postsArray.forEach(post => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-3 transition hover:shadow-md relative cursor-pointer";
                card.onclick = (e) => {
                    if(e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                    openDetailModal(post);
                };
                
                const keywordsHtml = post.keywords ? post.keywords.map(kw => `<span class="bg-indigo-50 text-indigo-600 text-xs px-2.5 py-1 rounded-lg font-medium">#${kw}</span>`).join(' ') : '';

                let adminButtonsHtml = '';
                if (isAdminMode) {
                    adminButtonsHtml = `
                        <div class="flex justify-end space-x-2 pt-3 border-t border-slate-100" onclick="event.stopPropagation()">
                            <button onclick="openEditModal('${post.firebaseKey}')" class="text-xs text-slate-500 hover:text-indigo-600 font-medium px-2.5 py-1 rounded-lg hover:bg-slate-100 transition">✏️ 수정</button>
                            <button onclick="deletePost('${post.firebaseKey}')" class="text-xs text-rose-500 hover:text-rose-700 font-medium px-2.5 py-1 rounded-lg hover:bg-rose-50 transition">🗑️ 삭제</button>
                        </div>
                    `;
                }

                const typeBadge = post.type === 'reflection' ? `<span class="bg-amber-50 text-amber-700 text-xs px-2.5 py-1 rounded-lg font-medium">성찰문항</span>` : '';
                const areaInfo = post.area ? `<span class="bg-indigo-50 text-indigo-700 text-xs px-2.5 py-1 rounded-lg font-bold">📌 영역: ${post.area}</span>` : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="space-y-1.5 pr-4">
                            ${areaInfo}
                            ${typeBadge}
                            <h3 class="text-lg font-bold text-slate-800">${post.title}</h3>
                        </div>
                        <div class="flex flex-wrap gap-1 justify-end" onclick="event.stopPropagation()">${keywordsHtml}</div>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed line-clamp-2">${linkifyText(post.content)}</p>
                    ${adminButtonsHtml}
                `;
                container.appendChild(card);
            });
        }

        window.openDetailModal = function(post) {
            const headerDiv = document.getElementById('detailModalHeader');
            const titleEl = document.getElementById('detailModalTitle');
            const contentEl = document.getElementById('detailModalContent');

            const kw = post.keywords ? post.keywords.map(k => `<span class="bg-indigo-50 text-indigo-600 text-xs px-2.5 py-1 rounded font-medium">#${k}</span>`).join(' ') : '';
            const areaInfo = post.area ? `<span class="bg-indigo-50 text-indigo-700 text-xs px-2.5 py-1 rounded-lg font-bold block mb-1">📌 영역: ${post.area}</span>` : '';
            
            headerDiv.innerHTML = `${areaInfo}<div class="flex flex-wrap gap-1">${kw}</div>`;
            titleEl.innerText = post.title;
            contentEl.innerHTML = linkifyText(post.content);

            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        window.closeDetailModal = function() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.refreshCurrentView = function() {
            if (document.getElementById('resultView').classList.contains('hidden')) return;
            
            if (currentActiveMode === 'case') {
                openAllList();
            } else if (currentActiveMode === 'reflection') {
                openReflectionList();
            } else if (currentActiveMode === 'pdf') {
                openPdfList();
            } else {
                handleSearch();
            }
        }

        window.goHome = function() {
            document.getElementById('searchInput').value = '';
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        }

        window.openWriteModal = function() {
            document.getElementById('postId').value = '';
            document.getElementById('modalTitleText').innerText = '새로운 항목 추가';
            document.getElementById('saveButtonText').innerText = '등록하기';
            document.getElementById('itemCategoryType').value = currentActiveMode === 'reflection' ? 'reflection' : (currentActiveMode === 'pdf' ? 'pdf' : 'case');
            document.getElementById('postArea').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postKeyword').value = '';
            document.getElementById('postContent').value = '';
            
            updateModalFields();
            document.getElementById('writeModal').classList.remove('hidden');
            document.getElementById('writeModal').classList.add('flex');
        }

        window.updateModalFields = function() {
            const type = document.getElementById('itemCategoryType').value;
            const fieldGroupArea = document.getElementById('fieldGroupArea');
            const titleLabel = document.getElementById('titleLabel');
            const titleInput = document.getElementById('postTitle');
            const contentLabel = document.getElementById('contentLabel');

            if (type === 'reflection') {
                fieldGroupArea.classList.remove('hidden');
                titleLabel.innerText = '핵심 질문';
                titleInput.placeholder = '예: 다양한 문화와 배경을 존중하는 환경 구성이 되어 있는가?';
                contentLabel.innerText = '상세 내용 및 노하우';
            } else if (type === 'pdf') {
                fieldGroupArea.classList.add('hidden');
                titleLabel.innerText = '사례집 제목';
                titleInput.placeholder = '예: 2026년 상반기 교사 현장 교육 사례집';
                contentLabel.innerText = 'PDF 구글 드라이브 공유 링크 주소';
            } else {
                fieldGroupArea.classList.add('hidden');
                titleLabel.innerText = '사례 제목';
                titleInput.placeholder = '사례 제목을 입력하세요';
                contentLabel.innerText = '상세 내용 및 노하우';
            }
        }

        window.openEditModal = function(firebaseKey) {
            const post = cachedPosts.find(p => p.firebaseKey === firebaseKey);
            if (!post) return;

            document.getElementById('postId').value = post.firebaseKey;
            document.getElementById('modalTitleText').innerText = '항목 수정하기';
            document.getElementById('saveButtonText').innerText = '수정 완료';
            document.getElementById('itemCategoryType').value = post.type || 'case';
            document.getElementById('postArea').value = post.area || '';
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postKeyword').value = post.keywords ? post.keywords.join(', ') : '';
            document.getElementById('postContent').value = post.content;

            updateModalFields();
            document.getElementById('writeModal').classList.remove('hidden');
            document.getElementById('writeModal').classList.add('flex');
        }

        window.closeWriteModal = function() {
            document.getElementById('writeModal').classList.add('hidden');
            document.getElementById('writeModal').classList.remove('flex');
        }

        window.deletePost = async function(firebaseKey) {
            if (!confirm('정말 이 항목을 삭제하시겠습니까?')) return;

            try {
                await remove(ref(db, 'posts/' + firebaseKey));
                alert('항목이 삭제되었습니다.');
                await fetchPostsFromFirebase();
            } catch (error) {
                console.error("삭제 실패:", error);
                alert('삭제 중 오류가 발생했습니다.');
            }
        }

        window.savePostToFirebase = async function() {
            const firebaseKey = document.getElementById('postId').value;
            const type = document.getElementById('itemCategoryType').value;
            const area = document.getElementById('postArea').value.trim();
            const title = document.getElementById('postTitle').value.trim();
            const keywordInput = document.getElementById('postKeyword').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content || (type === 'reflection' && !area)) {
                alert('필수 항목을 모두 입력해주세요.');
                return;
            }

            const keywords = keywordInput ? keywordInput.split(/[,,\s]+/).filter(k => k.length > 0) : [];

            try {
                if (firebaseKey) {
                    await set(ref(db, 'posts/' + firebaseKey), {
                        type,
                        area,
                        title,
                        keywords,
                        content
                    });
                    alert('성공적으로 수정되었습니다!');
                } else {
                    const newPostRef = push(ref(db, 'posts'));
                    await set(newPostRef, {
                        type,
                        area,
                        title,
                        keywords,
                        content
                    });
                    alert('성공적으로 등록되었습니다!');
                }

                closeWriteModal();
                await fetchPostsFromFirebase();
            } catch (error) {
                console.error("저장 실패:", error);
                alert('저장 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
